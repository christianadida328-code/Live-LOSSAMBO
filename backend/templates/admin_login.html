{% extends "base.html" %}
{% block content %}
<div class="container section">
  <div class="heroCard" style="max-width:520px">
    <p class="sectionTitle">Connexion admin</p>
    <p class="sectionHint">Connecte-toi avec ton Gmail admin et ton mot de passe.</p>
    <form class="form" method="post" style="margin-top:12px">
      <input class="input" name="email" type="email" placeholder="Gmail admin" required>
      <input class="input" name="password" type="password" placeholder="Mot de passe" required>
      <button class="btn btnPrimary" type="submit">Entrer dans l'admin</button>
    </form>
  </div>
</div>
{% endblock %}
